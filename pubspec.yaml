name: sinav_sayac
description: "A new Flutter project."
publish_to: 'none'
version: 1.1.6+12

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  flutter_riverpod: ^2.4.9
  intl: ^0.20.2
